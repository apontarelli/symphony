version: 1
# This committed manifest is this fork's dogfood configuration for running Symphony on itself.
# For another repository, generate a fresh manifest with `symphony workflow init` and replace the
# repository, tracker, workspace, validation, delivery, and Codex settings with project-local
# values.
project:
  slug: symphony
  name: Symphony
  repository: https://github.com/apontarelli/symphony
  kind: elixir
  app_kind: web
workflow:
  preset: default
  modules:
    - product_visual_review
docs:
  entrypoints:
    - README.md
    - PRODUCT.md
    - SPEC.md
    - elixir/AGENTS.md
    - elixir/README.md
validation:
  commands:
    - name: all
      command: cd elixir && mise exec -- make all
vcs:
  mode: jj
  default_branch: main
  posture: stacked
delivery:
  pr_target: main
automation:
  posture: unattended
  profile: default
  completion_requirements:
    - Run the strongest feasible validation gate before handoff.
harness:
  codex_home: null
runtime:
  tracker:
    # Dogfood Linear project scope for this repository's unattended runs.
    project_id: d3c9fafa-42b4-4b08-82d1-a54429b90346
    project_slug: symphony-self-contained-workflow-modules-72083cd8c253
  polling:
    interval_ms: 5000
  workspace:
    # Dogfood workspace root used by this repository's local Symphony runner.
    root: ~/code/symphony-workspaces
  hooks:
    after_create: |
      if ! command -v jj >/dev/null 2>&1; then
        echo 'jj is required for this Symphony workflow' >&2
        exit 127
      fi
      jj git clone https://github.com/apontarelli/symphony .
      if command -v mise >/dev/null 2>&1; then
        cd elixir && mise trust && mise exec -- mix deps.get
      fi
    before_run: |
      jj status || true
    before_remove: |
      cd elixir && mise exec -- mix workspace.before_remove
    timeout_ms: 60000
  agent:
    max_concurrent_agents: 10
    max_turns: 20
  codex:
    # Dogfood Codex launch policy for this repository's unattended automation.
    command: codex --config shell_environment_policy.inherit=all --config 'model="gpt-5.5"' --config model_reasoning_effort=xhigh app-server
    approval_policy: never
    thread_sandbox: workspace-write
    turn_sandbox_policy:
      type: workspaceWrite
      networkAccess: true
    execution_profiles:
      planner:
        reasoning_effort: high
        budget: standard
      source_reviewer:
        reasoning_effort: medium
        budget: standard
      test_reviewer:
        reasoning_effort: medium
        budget: standard
      runtime_qa:
        reasoning_effort: medium
        budget: standard
      product_visual_review:
        reasoning_effort: high
        budget: standard
      docs_reviewer:
        reasoning_effort: medium
        budget: standard
      security_reviewer:
        reasoning_effort: high
        budget: standard
      synthesis:
        reasoning_effort: high
        budget: standard
  quality_gate:
    enabled: true
    source_max_concurrency: 3
    max_repair_passes: 1
    runtime_isolation: serialized
    reviewer_timeout_ms: 1200000
    reviewer_max_retries: 0
  workflow_modules:
    product_visual_review:
      enabled: true
      project_kind: web
      route_policy: auto
  profiles:
    skill_authoring:
      delivery:
        pr_target: main
      codex:
        approval_policy: never
        thread_sandbox: danger-full-access
        turn_sandbox_policy:
          type: dangerFullAccess
      prompt:
        rules:
          - This profile is for explicit, interactive repo skill-authoring work that must edit repo-owned `.codex/skills/` or another ticket-specified repo-local skills directory.
          - It does not make globally installed `symphony-*` skills part of unattended runtime execution; default core workflow modules are self-contained.
          - Keep global Codex defaults sandboxed; use this profile only for explicit skill-authoring work.
