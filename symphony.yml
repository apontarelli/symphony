version: 1
# This committed manifest is this fork's dogfood configuration for running Symphony on itself.
# For another repository, generate a fresh manifest with `symphony workflow init` and replace the
# repository, validation, delivery, capability, and issue marker values with project-local values.
# Keep tracker scope, workspace roots, runner commands, and host runtime settings in local setup.
project:
  slug: symphony
  name: Symphony
  repository: https://github.com/apontarelli/symphony
  kind: elixir
  app_kind: web
workflow:
  preset: default
  modules:
    - product_visual_review
  config:
    product_visual_review:
      enabled: true
      project_kind: web
      route_policy: auto
docs:
  entrypoints:
    - README.md
    - PRODUCT.md
    - SPEC.md
    - elixir/AGENTS.md
    - elixir/README.md
validation:
  commands:
    - name: all
      command: cd elixir && mise exec -- make all
vcs:
  mode: jj
  default_branch: main
  posture: stacked
delivery:
  pr_target: main
automation:
  posture: unattended
  profile: default
  completion_requirements:
    - Run the strongest feasible validation gate before handoff.
capabilities:
  required:
    - linear
    - github_pr
    - browser
harness:
  codex_home: null
