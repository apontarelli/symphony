version: 1
project:
  slug: symphony
  name: Symphony
  repository: https://github.com/openai/symphony
  kind: elixir
  app_kind: web
workflow:
  preset: default
  modules: []
docs:
  entrypoints:
    - README.md
    - SPEC.md
    - elixir/AGENTS.md
    - elixir/README.md
validation:
  commands:
    - name: all
      command: cd elixir && make all
vcs:
  mode: jj
  default_branch: main
  posture: stacked
delivery:
  pr_target: main
automation:
  posture: unattended
  profile: default
  completion_requirements:
    - Run the strongest feasible validation gate before handoff.
harness:
  codex_home: null
bindings:
  local_file: .symphony.local.yml
  require_local: false
runtime:
  tracker:
    project_slug: $SYMPHONY_LINEAR_PROJECT_SLUG
  polling:
    interval_ms: 5000
  workspace:
    root: ~/code/symphony-workspaces
  hooks:
    after_create: |
      if ! command -v jj >/dev/null 2>&1; then
        echo 'jj is required for this Symphony workflow' >&2
        exit 127
      fi
      jj git clone https://github.com/openai/symphony .
      if command -v mise >/dev/null 2>&1; then
        cd elixir && mise trust && mise exec -- mix deps.get
      fi
    before_run: |
      jj status || true
    before_remove: |
      cd elixir && mise exec -- mix workspace.before_remove
    timeout_ms: 60000
  agent:
    max_concurrent_agents: 10
    max_turns: 20
  codex:
    command: codex --config shell_environment_policy.inherit=all --config 'model="gpt-5.5"' --config model_reasoning_effort=xhigh app-server
    approval_policy: never
    thread_sandbox: workspace-write
    turn_sandbox_policy:
      type: workspaceWrite
      networkAccess: true
  profiles:
    skill_authoring:
      delivery:
        pr_target: main
      codex:
        approval_policy: never
        thread_sandbox: danger-full-access
        turn_sandbox_policy:
          type: dangerFullAccess
      prompt:
        rules:
          - This ticket may create or edit repo-owned agent skills under `.agents/`.
          - Keep global Codex defaults sandboxed; use this profile only for explicit skill-authoring work.
